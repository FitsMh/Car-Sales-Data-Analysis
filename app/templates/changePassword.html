{% extends 'base.html' %}

{% block title %}
    修改密码页面
{% endblock %}

{% block content %}
    <div class="pagetitle" style="display: flex;align-items: center">
        <div style="margin-right: auto">
            <h1 style="color: var(--biz-dark) !important; font-weight: 600;">修改密码</h1>
            <nav>
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'changeSelfInfo' %}" style="color: var(--biz-normal) !important;">个人信息</a></li>
                    <li class="breadcrumb-item active" style="color: var(--biz-dark) !important; font-weight: 500;">修改密码页面</li>
                </ol>
            </nav>
        </div>
    </div>

    <style>
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 16px rgba(37, 99, 235, 0.15) !important;
        }
        [data-theme="dark"] .card:hover {
            box-shadow: 0 4px 16px rgba(96, 165, 250, 0.15) !important;
        }

        .card-title {
            color: var(--biz-dark) !important;
            font-weight: 600;
        }

        .col-form-label {
            text-align: right;
            color: var(--biz-dark) !important;
            font-weight: 500;
        }

        .btn-primary {
            background-color: var(--biz-normal) !important;
            border-color: var(--biz-normal) !important;
        }
        .btn-primary:hover {
            background-color: var(--biz-dark) !important;
            border-color: var(--biz-dark) !important;
        }

        .form-control {
            background-color: #fff !important;
            color: var(--biz-text) !important;
            border: 1px solid var(--biz-border) !important;
        }
        [data-theme="dark"] .form-control {
            background-color: #334155 !important;
            color: #f1f5f9 !important;
            border-color: #475569 !important;
        }

        .form-control:focus {
            border-color: var(--biz-normal) !important;
            box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.2) !important;
        }
        [data-theme="dark"] .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(96, 165, 250, 0.25) !important;
        }

        .breadcrumb-item a {
            color: var(--biz-normal) !important;
            transition: color 0.3s ease;
        }
        .breadcrumb-item a:hover {
            color: var(--biz-dark) !important;
        }
        .breadcrumb-item.active {
            color: var(--biz-dark) !important;
            font-weight: 500;
        }
        .breadcrumb-item + .breadcrumb-item::before {
            color: var(--biz-normal) !important;
        }
    </style>

    <section class="section dashboard">
        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">修改密码</h5>

                        <form action="{% url 'changePassword' %}" method="post">
                            <div class="activity">
                                <div class="row mb-3">
                                    <label for="oldPassword" class="col-sm-1 col-form-label">原始密码:</label>
                                    <div class="col-sm-5">
                                        <input type="password" id="oldPassword" name="oldPassword" class="form-control" placeholder="请输入原始密码">
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <label for="newPassword" class="col-sm-1 col-form-label">输入新密码:</label>
                                    <div class="col-sm-5">
                                        <input type="password" id="newPassword" name="newPassword" class="form-control" placeholder="请输入新密码">
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <label for="newPasswordConfirm" class="col-sm-1 col-form-label">新密码确认:</label>
                                    <div class="col-sm-5">
                                        <input type="password" id="newPasswordConfirm" name="newPasswordConfirm" class="form-control" placeholder="请再次输入新密码">
                                    </div>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <label class="col-sm-1 col-form-label"></label>
                                <div class="col-sm-5">
                                    <button type="submit" class="btn btn-primary">提交</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
{% endblock %}

{% block echarts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const helpBtn = document.querySelector('#showHelpBtn');
    if (helpBtn) {
        helpBtn.disabled = false;
        helpBtn.style.pointerEvents = 'auto';
        helpBtn.style.opacity = '1';
        helpBtn.title = "查看页面帮助";

        helpSteps = [
            {
                selector: '.pagetitle h1',
                text: '这里是修改密码页面，你可以在这里更新你的账户密码。'
            },
            {
                selector: '[name="oldPassword"]',
                text: '请输入你当前正在使用的原始密码。'
            },
            {
                selector: '[name="newPassword"]',
                text: '输入你要设置的新密码，建议长度大于6位。'
            },
            {
                selector: '[name="newPasswordConfirm"]',
                text: '再次输入新密码，确保两次输入一致。'
            },
            {
                selector: '.btn-primary',
                text: '确认填写无误后，点击提交完成密码修改。'
            }
        ];
    }
});
</script>
{% endblock %}
